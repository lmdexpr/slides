<svg width="680" height="290" viewBox="0 0 680 290" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">
  <title>AWS 認証情報の整理</title>
  <desc>クレデンシャルの種類(長期・短期)が調達経路を経て、SigV4 署名に必要な3点セットに収束する構図</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 左カラム: クレデンシャルの種類 -->
  <rect x="40" y="40" width="190" height="200" rx="12" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="52" y="64" font-size="14" font-weight="600" fill="#444441">クレデンシャルの種類</text>

  <rect x="52" y="80" width="166" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="135" y="100" font-size="14" font-weight="600" fill="#712B13" text-anchor="middle" dominant-baseline="central">長期的認証情報</text>
  <text x="135" y="120" font-size="12" fill="#993C1D" text-anchor="middle" dominant-baseline="central">IAM アクセスキー</text>

  <rect x="52" y="148" width="166" height="78" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="135" y="168" font-size="14" font-weight="600" fill="#085041" text-anchor="middle" dominant-baseline="central">短期的認証情報</text>
  <text x="135" y="188" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">STS が発行・期限つき</text>
  <text x="135" y="206" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">SSO・AssumeRole 等</text>

  <!-- 中央カラム: 調達経路 -->
  <rect x="270" y="40" width="170" height="200" rx="12" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="282" y="64" font-size="14" font-weight="600" fill="#444441">調達経路(探索順)</text>

  <rect x="282" y="80" width="146" height="30" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="1"/>
  <text x="355" y="95" font-size="12" fill="#444441" text-anchor="middle" dominant-baseline="central">環境変数</text>
  <rect x="282" y="118" width="146" height="30" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="1"/>
  <text x="355" y="133" font-size="12" fill="#444441" text-anchor="middle" dominant-baseline="central">共有プロファイル</text>
  <rect x="282" y="156" width="146" height="30" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="1"/>
  <text x="355" y="171" font-size="12" fill="#444441" text-anchor="middle" dominant-baseline="central">SSO キャッシュ</text>
  <rect x="282" y="194" width="146" height="30" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="1"/>
  <text x="355" y="209" font-size="12" fill="#444441" text-anchor="middle" dominant-baseline="central">IMDS / コンテナ</text>

  <!-- 右カラム: 3点セット → sigv4.ml -->
  <rect x="480" y="68" width="160" height="100" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="560" y="88" font-size="14" font-weight="600" fill="#3C3489" text-anchor="middle" dominant-baseline="central">署名に必要な3点</text>
  <text x="560" y="112" font-size="12" fill="#534AB7" text-anchor="middle" dominant-baseline="central">access key ID</text>
  <text x="560" y="130" font-size="12" fill="#534AB7" text-anchor="middle" dominant-baseline="central">secret access key</text>
  <text x="560" y="148" font-size="12" fill="#534AB7" text-anchor="middle" dominant-baseline="central">session token(短期)</text>

  <line x1="560" y1="172" x2="560" y2="198" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="480" y="202" width="160" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
  <text x="560" y="224" font-size="14" font-weight="600" fill="#2C2C2A" text-anchor="middle" dominant-baseline="central">sigv4.ml で署名</text>

  <!-- カラム間の矢印 -->
  <line x1="234" y1="140" x2="266" y2="140" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="444" y1="118" x2="476" y2="118" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
